<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Invoice</title>
    <style>
        body { font-family: 'Arial', sans-serif; font-size: 12px; color: #000; padding: 20px; }
        .invoice-box { max-width: 800px; margin: auto; border: 1px solid #000; padding: 15px; }
        
        .grid-addresses { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid #000; }
        .box { padding: 10px; border-right: 1px solid #000; }
        .box:last-child { border-right: none; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #000; padding: 5px; text-align: left; }
        input { border: 1px solid #ddd; width: 90%; font-family: inherit; }
        
        .totals-table { width: 300px; margin-left: auto; margin-top: 10px; border: 1px solid #000; }
        
        @media print {
            .no-print { display: none; }
            input { border: none !important; }
        }
    </style>
</head>
<body>

<div class="no-print" style="margin-bottom: 20px;">
    <button onclick="window.print()">Print / Save as PDF</button>
    <button onclick="addRow()">+ Add Item</button>
</div>

<div class="invoice-box">
    <h1 style="text-align: right;">Invoice</h1>
    
    <div style="margin-bottom: 20px;">
        <input type="text" placeholder="Invoice Details (No, Date, Due Date, etc.)">
    </div>

    <div class="grid-addresses">
        <div class="box"><strong>Billed By</strong><textarea style="width:100%; border:none;"></textarea></div>
        <div class="box"><strong>Billed To</strong><textarea style="width:100%; border:none;"></textarea></div>
        <div class="box"><strong>Shipped To</strong><textarea style="width:100%; border:none;"></textarea></div>
    </div>

    <table id="itemTable">
        <thead>
            <tr><th>Item</th><th>HSN</th><th>GST</th><th>Qty</th><th>Rate</th><th>Amount</th><th>CGST</th><th>SGST</th><th>Total</th></tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text"></td>
                <td><input type="text"></td>
                <td><input type="number" class="gst" value="18" oninput="calculate()">%</td>
                <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
                <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
                <td class="amount">0.00</td>
                <td class="cgst">0.00</td>
                <td class="sgst">0.00</td>
                <td class="total">0.00</td>
            </tr>
        </tbody>
    </table>

    <table class="totals-table">
        <tr><td><strong>Grand Total (INR)</strong></td><td><strong id="grandTotal">0.00</strong></td></tr>
    </table>

    <div style="margin-top: 20px; border: 1px solid #000; padding: 10px;">
        <strong>Bank Details</strong><br>
        <input type="text" placeholder="Account Name, Number, IFSC, Bank Name" style="width:100%">
    </div>
</div>

<script>
    function addRow() {
        let table = document.getElementById("itemTable").getElementsByTagName('tbody')[0];
        let row = table.insertRow(-1);
        row.innerHTML = `<td><input type="text"></td><td><input type="text"></td>
            <td><input type="number" class="gst" value="18" oninput="calculate()">%</td>
            <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
            <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
            <td class="amount">0.00</td><td class="cgst">0.00</td><td class="sgst">0.00</td><td class="total">0.00</td>`;
    }

    function calculate() {
        let grandTotal = 0;
        let rows = document.querySelectorAll("#itemTable tbody tr");
        rows.forEach(row => {
            let qty = parseFloat(row.querySelector(".qty").value) || 0;
            let rate = parseFloat(row.querySelector(".rate").value) || 0;
            let gst = parseFloat(row.querySelector(".gst").value) || 0;
            
            let amount = qty * rate;
            let tax = amount * (gst / 100);
            
            row.querySelector(".amount").innerText = amount.toFixed(2);
            row.querySelector(".cgst").innerText = (tax / 2).toFixed(2);
            row.querySelector(".sgst").innerText = (tax / 2).toFixed(2);
            row.querySelector(".total").innerText = (amount + tax).toFixed(2);
            
            grandTotal += (amount + tax);
        });
        document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);
    }
</script>

</body>
</html>
