<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Generator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .no-print { margin-bottom: 20px; }
        @media print { .no-print { display: none; } }
        .totals { width: 300px; margin-left: auto; }
        .totals p { display: flex; justify-content: space-between; margin: 5px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <button onclick="window.print()">Download / Save as PDF</button>
        <button onclick="addRow()">Add Item</button>
    </div>

    <h1>INVOICE</h1>
    <input type="text" placeholder="Invoice Number" style="width: 100%; margin-bottom: 10px;">
    
    <table id="invoiceTable">
        <tr>
            <th>Item</th><th>HSN</th><th>Qty</th><th>Rate</th><th>Amount</th>
        </tr>
        <tr>
            <td><input type="text" placeholder="Description"></td>
            <td><input type="text" placeholder="HSN"></td>
            <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
            <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
            <td class="amount">0.00</td>
        </tr>
    </table>

    <div class="totals">
        <p>Subtotal: <span id="subtotal">0.00</span></p>
        <p>CGST (9%): <span id="cgst">0.00</span></p>
        <p>SGST (9%): <span id="sgst">0.00</span></p>
        <hr>
        <p><strong>Total: <span id="grandTotal">0.00</span></strong></p>
    </div>
</div>

<script>
    function addRow() {
        let table = document.getElementById("invoiceTable");
        let row = table.insertRow(-1);
        row.innerHTML = `<td><input type="text"></td><td><input type="text"></td>
                         <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
                         <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
                         <td class="amount">0.00</td>`;
    }

    function calculate() {
        let subtotal = 0;
        let rows = document.querySelectorAll("#invoiceTable tr");
        
        for (let i = 1; i < rows.length; i++) {
            let qty = rows[i].querySelector(".qty").value;
            let rate = rows[i].querySelector(".rate").value;
            let amount = qty * rate;
            rows[i].querySelector(".amount").innerText = amount.toFixed(2);
            subtotal += amount;
        }

        let gst = subtotal * 0.18;
        document.getElementById("subtotal").innerText = subtotal.toFixed(2);
        document.getElementById("cgst").innerText = (gst / 2).toFixed(2);
        document.getElementById("sgst").innerText = (gst / 2).toFixed(2);
        document.getElementById("grandTotal").innerText = (subtotal + gst).toFixed(2);
    }
</script>

</body>
</html>
