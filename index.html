<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Invoice</title>
    <style>
        body { font-family: 'Arial', sans-serif; font-size: 13px; color: #000; padding: 20px; }
        .invoice-box { max-width: 800px; margin: auto; border: 1px solid #000; padding: 20px; background: #fff; }
        .header-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #000; padding-bottom: 10px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border-top: 1px solid #000; border-left: 1px solid #000; margin-top: 20px; }
        .box { border-right: 1px solid #000; border-bottom: 1px solid #000; padding: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f2f2f2; border: 1px solid #000; padding: 8px; }
        td { border: 1px solid #000; padding: 8px; vertical-align: top; word-wrap: break-word; }
        
        input, textarea { border: none; width: 100%; font-family: inherit; resize: none; background: transparent; }
        
        @media print {
            .no-print { display: none; }
            .invoice-box { border: none; }
        }
    </style>
</head>
<body onload="populateDefaults()">

<div class="no-print">
    <button onclick="window.print()">Print / Save as PDF</button>
    <button onclick="addRow()">+ Add Item</button>
</div>

<div class="invoice-box" id="invoice">
    <div class="header-top">
        <img src=logo.png style="max-width:120px;">
        <h1 style="margin:0;">Invoice</h1>
    </div>

    <!-- Company Details Auto-Populated -->
    <div class="grid-container">
        <div class="box"><strong>Billed By:</strong><br><textarea id="billedBy" style="height:60px;"></textarea></div>
        <div class="box"><strong>Shipped From:</strong><br><textarea id="shippedFrom" style="height:60px;"></textarea></div>
        <div class="box"><strong>Billed To:</strong><br><textarea placeholder="Enter Client Details..." style="height:60px;"></textarea></div>
        <div class="box"><strong>Shipped To:</strong><br><textarea placeholder="Enter Shipping Details..." style="height:60px;"></textarea></div>
    </div>

    <table id="itemTable">
        <thead>
            <tr><th>Item</th><th>HSN</th><th>GST</th><th>Qty</th><th>Rate</th><th>Total</th></tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text"></td><td><input type="text"></td>
                <td><input type="number" class="gst" value="18" oninput="calculate()">%</td>
                <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
                <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
                <td class="total">0.00</td>
            </tr>
        </tbody>
    </table>

    <div style="margin-top:20px; border: 1px solid #000; padding:10px;">
        <strong>Bank Details</strong><br>
        <textarea id="bankDetails" style="width:100%; height:40px;"></textarea>
    </div>
</div>

<script>
    // 1. CONFIGURATION: Change these to your actual details
    const myData = {
        billedBy: "SK Corporate Gifting\nOm Chambers, 4th Floor, Binnamangala\nGST: 29AEOPK3990D1Z4",
        shippedFrom: "SK Corporate Gifting\nOm Chambers, 4th Floor, Binnamangala\nBengaluru, 560038",
        bankDetails: "Bank: HDFC | A/C: 50100573172931 | IFSC: HDFC0002895 | Name: SUDHA KUMARI"
    };

    function populateDefaults() {
        document.getElementById('billedBy').value = myData.billedBy;
        document.getElementById('shippedFrom').value = myData.shippedFrom;
        document.getElementById('bankDetails').value = myData.bankDetails;
    }

    function addRow() {
        let table = document.getElementById("itemTable").getElementsByTagName('tbody')[0];
        let row = table.insertRow(-1);
        row.innerHTML = `<td><input type="text"></td><td><input type="text"></td>
            <td><input type="number" class="gst" value="18" oninput="calculate()">%</td>
            <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
            <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
            <td class="total">0.00</td>`;
    }

    function calculate() {
        document.querySelectorAll("#itemTable tbody tr").forEach(row => {
            let qty = parseFloat(row.querySelector(".qty").value) || 0;
            let rate = parseFloat(row.querySelector(".rate").value) || 0;
            let gst = parseFloat(row.querySelector(".gst").value) || 0;
            let total = (qty * rate) * (1 + gst/100);
            row.querySelector(".total").innerText = total.toFixed(2);
        });
    }
</script>
</body>
</html>
