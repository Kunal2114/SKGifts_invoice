<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tax Invoice</title>
    <style>
        body { font-family: 'Arial', sans-serif; font-size: 12px; color: #000; padding: 20px; }
        .invoice-box { max-width: 800px; margin: auto; border: 1px solid #000; padding: 20px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #000; border-left: 1px solid #000; }
        .box { border-right: 1px solid #000; border-bottom: 1px solid #000; padding: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 6px; text-align: left; overflow: hidden; }
        
        /* Fixes: allow input to fill space and word-wrap */
        input, textarea { border: none; width: 100%; font-family: inherit; resize: none; box-sizing: border-box; background: transparent; }
        
        @media print {
            .no-print { display: none; }
            .invoice-box { border: none; }
            input, textarea { border: none !important; }
        }
    </style>
</head>
<body onload="populateDefaults()">

<div class="no-print"><button onclick="window.print()">Print PDF</button> <button onclick="addRow()">+ Add Item</button></div>

<div class="invoice-box">
    <div style="display:flex; justify-content:space-between; border-bottom:2px solid #000; padding-bottom:10px;">
        <img src=logo.png style="max-width:100px;">
        <h1>Invoice</h1>
    </div>

    <div class="grid-container">
        <div class="box"><strong>Billed By:</strong><textarea id="billedBy" style="height:50px;"></textarea></div>
        <div class="box"><strong>Shipped From:</strong><textarea id="shippedFrom" style="height:50px;"></textarea></div>
        <div class="box"><strong>Billed To:</strong><textarea style="height:50px;"></textarea></div>
        <div class="box"><strong>Shipped To:</strong><textarea style="height:50px;"></textarea></div>
    </div>

    <table id="itemTable">
        <thead>
            <tr><th style="width:25%;">Item</th><th>HSN</th><th>GST</th><th>Qty</th><th>Rate</th><th>Amt</th><th>CGST</th><th>SGST</th><th>Total</th></tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text"></td><td><input type="text"></td>
                <td><input type="number" class="gst" value="18" oninput="calculate()">%</td>
                <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
                <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
                <td class="amount">0.00</td><td class="cgst">0.00</td><td class="sgst">0.00</td><td class="total">0.00</td>
            </tr>
        </tbody>
    </table>

    <div style="margin-top:20px; border:1px solid #000; padding:10px;">
        <strong>Bank Details</strong><br>
        <textarea id="bankDetails" style="height:40px;"></textarea>
    </div>
</div>

<script>
    const myData = {
        billedBy: "SK Corporate Gifting, Om Chambers, 4th Floor, Binnamangala, Bengaluru, 560038",
        shippedFrom: "SK Corporate Gifting, Om Chambers, 4th Floor, Binnamangala, Bengaluru, 560038",
        bankDetails: "SUDHA KUMARI | A/C: 50100573172931 | IFSC: HDFC0002895 | HDFC BANK"
    };

    function populateDefaults() {
        document.getElementById('billedBy').value = myData.billedBy;
        document.getElementById('shippedFrom').value = myData.shippedFrom;
        document.getElementById('bankDetails').value = myData.bankDetails;
    }

    function addRow() {
        let tbody = document.querySelector("#itemTable tbody");
        let row = tbody.insertRow(-1);
        row.innerHTML = `<td><input type="text"></td><td><input type="text"></td>
            <td><input type="number" class="gst" value="18" oninput="calculate()">%</td>
            <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
            <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
            <td class="amount">0.00</td><td class="cgst">0.00</td><td class="sgst">0.00</td><td class="total">0.00</td>`;
    }

    function calculate() {
        document.querySelectorAll("#itemTable tbody tr").forEach(row => {
            let q = parseFloat(row.querySelector(".qty").value) || 0;
            let r = parseFloat(row.querySelector(".rate").value) || 0;
            let g = parseFloat(row.querySelector(".gst").value) || 0;
            let amt = q * r;
            let tax = amt * (g / 100);
            row.querySelector(".amount").innerText = amt.toFixed(2);
            row.querySelector(".cgst").innerText = (tax / 2).toFixed(2);
            row.querySelector(".sgst").innerText = (tax / 2).toFixed(2);
            row.querySelector(".total").innerText = (amt + tax).toFixed(2);
        });
    }
</script>
</body>
</html>
