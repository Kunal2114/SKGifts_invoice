<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice</title>
    <style>
        body { font-family: 'Arial', sans-serif; font-size: 13px; color: #000; padding: 20px; }
        .invoice-box { max-width: 800px; margin: auto; border: 1px solid #000; padding: 20px; }
        .logo { max-width: 150px; margin-bottom: 10px; }
        
        .grid-header { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .address-box { border: 1px solid #000; padding: 10px; min-height: 80px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f2f2f2; border: 1px solid #000; padding: 8px; }
        td { border: 1px solid #000; padding: 8px; }
        input { border: none; width: 100%; font-family: inherit; }

        .totals-table { width: 300px; margin-left: auto; margin-top: 10px; }
        .totals-table td { border: none; padding: 5px; }

        @media print {
            .no-print { display: none; }
            .invoice-box { border: none; }
            input { border: none !important; }
            th { background: #fff !important; }
        }
    </style>
</head>
<body>

<div class="no-print" style="margin-bottom: 20px;">
    <button onclick="window.print()">Print / Save as PDF</button>
    <button onclick="addRow()">+ Add Item</button>
</div>

<div class="invoice-box">
    <img src=logo.png class="logo" alt="Logo">
    <div style="text-align: right; float: right;"><h1>Invoice</h1></div>
    
    <div style="margin-bottom: 20px;">
        Invoice No: <input type="text" style="width: 150px;" placeholder="INV-001"><br>
        Date: <input type="date">
    </div>

    <div class="grid-header">
        <div class="address-box"><strong>Billed By:</strong><br><textarea style="width:100%; border:none; height:60px;"></textarea></div>
        <div class="address-box"><strong>Billed To:</strong><br><textarea style="width:100%; border:none; height:60px;"></textarea></div>
    </div>

    <table id="itemTable">
        <thead>
            <tr><th>Item</th><th>HSN/SAC</th><th>GST</th><th>Qty</th><th>Rate</th><th>Amount</th><th>CGST</th><th>SGST</th><th>Total</th></tr>
        </thead>
        <tbody>
            <tr>
                <td><input type="text" placeholder="Product Name"></td>
                <td><input type="text" placeholder="Code"></td>
                <td><input type="number" class="gst" value="18" oninput="calculate()">%</td>
                <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
                <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
                <td class="amount">0.00</td>
                <td class="cgst">0.00</td>
                <td class="sgst">0.00</td>
                <td class="total">0.00</td>
            </tr>
        </tbody>
    </table>

    <table class="totals-table">
        <tr><td><strong>Total (INR)</strong></td><td><strong id="grandTotal">0.00</strong></td></tr>
    </table>
</div>

<script>
    function addRow() {
        let table = document.getElementById("itemTable").getElementsByTagName('tbody')[0];
        let row = table.insertRow(-1);
        row.innerHTML = `<td><input type="text"></td><td><input type="text"></td>
            <td><input type="number" class="gst" value="18" oninput="calculate()">%</td>
            <td><input type="number" class="qty" value="1" oninput="calculate()"></td>
            <td><input type="number" class="rate" value="0" oninput="calculate()"></td>
            <td class="amount">0.00</td><td class="cgst">0.00</td><td class="sgst">0.00</td><td class="total">0.00</td>`;
    }

    function calculate() {
        let grandTotal = 0;
        document.querySelectorAll("#itemTable tbody tr").forEach(row => {
            let qty = parseFloat(row.querySelector(".qty").value) || 0;
            let rate = parseFloat(row.querySelector(".rate").value) || 0;
            let gst = parseFloat(row.querySelector(".gst").value) || 0;
            let amount = qty * rate;
            let tax = amount * (gst / 100);
            row.querySelector(".amount").innerText = amount.toFixed(2);
            row.querySelector(".cgst").innerText = (tax / 2).toFixed(2);
            row.querySelector(".sgst").innerText = (tax / 2).toFixed(2);
            row.querySelector(".total").innerText = (amount + tax).toFixed(2);
            grandTotal += (amount + tax);
        });
        document.getElementById("grandTotal").innerText = grandTotal.toFixed(2);
    }
</script>

</body>
</html>
